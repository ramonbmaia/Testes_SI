<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULADORA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .telaPrincipal { display: flex; flex-direction: row; align-items: flex-start; gap: 40px; padding: 20px; }
        .calculadora { display: flex; flex-direction: column; }
        .inputs { display: flex; justify-content: start; margin: 0; gap: 5px; }
        #num1, #num2 { width: 100px; height: 30px; border: 1px solid black; border-radius: 8px; padding: 0 0 0 10px; }        
        .botoes { display: flex; justify-content: start; margin: 10px 0; gap: 5px; }
        #soma, #subtracao, #multiplicacao, #divisao, #ce { border: none; border-radius: 8px; width: 41.5px; height: 25px; }
            #soma:hover, #subtracao:hover, #multiplicacao:hover, #divisao:hover, #ce:hover { background-color: lightgray; color: black; transform: scale(1.1); }
                #soma:active, #subtracao:active, #multiplicacao:active, #divisao:active, #ce:active { background-color: black; color: white; }        
        #resultado { display: flex; justify-content: center; align-items: center; width: 226px; height: 60px; border: 1px solid black; border-radius: 8px; font-size: 35px; }
        .testes { display: flex; flex-direction: column; }
        .painelDeTestes { display: grid; grid-template-columns: 1fr 1fr; width: auto; gap: 10px; }
            .painelDeTestes button { padding: 8px; border-radius: 8px; border: none; }
                .painelDeTestes button:hover { background-color: lightgray; color: black; }
                    .painelDeTestes button:active { background-color: black; color: white; }
    </style>
</head>
<body>
    <div class="telaPrincipal">
        
        <div class="calculadora">
            <h3>Calculadora</h3>
            <div class="inputs">
                <input id="num1" type="number" placeholder="Inserir número">
                <input id="num2" type="number" placeholder="Inserir número">
            </div>

            <div class="botoes">
                <button id="soma" onclick="soma()">+</button>
                <button id="subtracao" onclick="subtracao()">-</button>
                <button id="multiplicacao" onclick="multiplicacao()">*</button>
                <button id="divisao" onclick="divisao()">/</button>
                <button id="ce" onclick="c()">C</button>
            </div>

            <div id="resultado">=</div>
        </div>

        <div class="testes">
            <h3>Painel de Testes</h3>
            <div class="painelDeTestes">
                <button onclick="testarComponenteSoma()">Testar Soma</button>
                <button onclick="testarComponenteSubtracao()">Testar Subtração</button>
                <button onclick="testarComponenteMultiplicacao()">Testar Multiplicação</button>
                <button onclick="testarComponenteDivisao()">Testar Divisão</button>
                <button onclick="testarComponenteC()">Testar Botão C</button>
                <button onclick="chamarTesteDeElementos()">Teste de Elementos</button>
            </div>
        </div>

    </div>

    <div id="saidaTesteDeElementos"></div>
    
    <script>
        function soma() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            const resultadoSoma = num1 + num2;

            document.getElementById("resultado").innerHTML = isNaN(resultadoSoma) ? "=" : resultadoSoma;
        }

        // TESTE DE SOMA

        function testarComponenteSoma() {
            document.getElementById("num1").value = "15";
            document.getElementById("num2").value = "5";

            soma(); 

            let resultadoObtido = document.getElementById("resultado").innerHTML;
            let resultadoEsperado = "20";

            if (resultadoObtido === resultadoEsperado) {
                alert("TESTE PASSOU: 15 + 5 = " + resultadoObtido);
            } else {
                alert("TESTE FALHOU!");
            }
        }

        function subtracao() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML = num1 - num2;
        }

        // TESTE DE SUBTRAÇÃO

        function testarComponenteSubtracao() {
            document.getElementById("num1").value = "25";
            document.getElementById("num2").value = "4";

            subtracao(); 

            let resultadoObtido = document.getElementById("resultado").innerHTML;
            let resultadoEsperado = "21";

            if (resultadoObtido === resultadoEsperado) {
                alert("TESTE PASSOU: 24 - 4 = " + resultadoObtido);
            } else {
                alert("TESTE FALHOU!");
            }
        }
        
        function multiplicacao() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML = num1 * num2;
        }
        
        // TESTE DE MULTIPLICACAO

        function testarComponenteMultiplicacao() {
            document.getElementById("num1").value = "5";
            document.getElementById("num2").value = "6";

            multiplicacao(); 

            let resultadoObtido = document.getElementById("resultado").innerHTML;
            let resultadoEsperado = "30";

            if (resultadoObtido === resultadoEsperado) {
                alert("TESTE PASSOU: 5 * 6 = " + resultadoObtido);
            } else {
                alert("TESTE FALHOU!");
            }
        }      
        
        function divisao() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("resultado").innerHTML = num1 / num2;
        }

        // TESTE DE DIVISÃO

        function testarComponenteDivisao() {
            document.getElementById("num1").value = "40";
            document.getElementById("num2").value = "2";

            divisao(); 

            let resultadoObtido = document.getElementById("resultado").innerHTML;
            let resultadoEsperado = "20";

            if (resultadoObtido === resultadoEsperado) {
                alert("TESTE PASSOU: 40 / 2 = " + resultadoObtido);
            } else {
                alert("TESTE FALHOU!");
            }
        }        
        
        function c() {
            document.getElementById("num1").value = "";
            document.getElementById("num2").value = "";
            document.getElementById("resultado").innerText = "=";
        }

        // TESTE DO BOTÃO LIMPAR

        function testarComponenteC() {
            document.getElementById("num1").value = "10";
            document.getElementById("num2").value = "10";

            c();

            if (document.getElementById("num1").value == "" && document.getElementById("num2").value == "") {
                alert("TESTE PASSOU: Os inputs foram limpos!");
            } else {
                alert("TESTE FALHOU!");
            }
        } 

        // TESTE DE COMPONENTES

        function chamarTesteDeElementos() {
            const inputNumero1 = document.getElementById("num1");
            const inputNumero2 = document.getElementById("num2");
            const botaoDeSoma = document.getElementById("soma");
            const botaoDeSubtracao = document.getElementById("subtracao");
            const botaoDeMultiplicacao = document.getElementById("multiplicacao");
            const botaoDeDivisao = document.getElementById("divisao");
            const botaoDeLimparEntradas = document.getElementById("ce");
            const divDeResultado = document.getElementById("resultado");

            alert("Saída do teste gerada no console do navegador!");

            if (inputNumero1) {
                console.log("TESTE PASSOU: O input de número 1 existe!");
            } else {
                console.log("TESTE FALHOU: O input de número 1 não existe!");
            }

            if (inputNumero2) {
                console.log("TESTE PASSOU: O input de número 2 existe!");
            } else {
                console.log("TESTE FALHOU: O input de número 2 não existe!");
            }
            
            if (botaoDeSoma) {
                console.log("TESTE PASSOU: O botão de soma existe!");
            } else {
                console.log("TESTE FALHOU: O botão de soma não existe !");
            }
            
            if (botaoDeSubtracao) {
                console.log("TESTE PASSOU: O botão de subtração existe!");
            } else {
                console.log("TESTE FALHOU: O botão de subtração não existe!");
            }
            
            if (botaoDeMultiplicacao) {
                console.log("TESTE PASSOU: O botão de multiplicação existe!");
            } else {
                console.log("TESTE FALHOU: O botão de multiplicação não existe!");
            }
            
            if (botaoDeDivisao) {
                console.log("TESTE PASSOU: O botão de divisão existe!");
            } else {
                console.log("TESTE FALHOU: O botão de divisão não existe!");
            }
            
            if (botaoDeLimparEntradas) {
                console.log("TESTE PASSOU: O botão para limpar entradas existe!");
            } else {
                console.log("TESTE FALHOU: O botão para limpar entradas não existe!");
            }
            
            if (divDeResultado) {
                console.log("TESTE PASSOU: A div para exibir resultados existe!");
            } else {
                console.log("TESTE FALHOU: A div para exibir resultados não existe!");
            }            
        }
    </script>
</body>
</html>
