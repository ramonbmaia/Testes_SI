<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULADORA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .inputs { display: flex; justify-content: center; margin: 15px 15px; gap: 5px; }
        #num1, #num2 { width: 100px; height: 30px; border: 1px solid black; border-radius: 8px; padding: 0 0 0 10px; }
        .botoes { display: flex; justify-content: center; margin: 15px 15px; gap: 5px; }
        #soma, #subtracao, #multiplicacao, #divisao, #ce { border: none; border-radius: 8px; width: 40px; height: 25px; }
            #soma:hover, #subtracao:hover, #multiplicacao:hover, #divisao:hover, #ce:hover { background-color: lightgray; color: black; }
                #soma:active, #subtracao:active, #multiplicacao:active, #divisao:active, #ce:active { background-color: black; color: white; }
        #resultado { display: flex; justify-content: center; align-items: center; margin: 0 auto; width: 220px; height: 60px; border: 1px solid black; border-radius: 8px; font-size: 35px; }
        #resultadoTeste { display: flex; justify-content: center; margin-top: 15px; gap: 20px; }
</style>
</head>
<body>
    <div class="inputs">
        <input id="num1" type="number" placeholder="Inserir número">
        <input id="num2" type="number" placeholder="Inserir número">
    </div>

    <div class="botoes">
        <button id="soma" onclick="soma()">+</button>
        <button id="subtracao" onclick="subtracao()">-</button>
        <button id="multiplicacao" onclick="multiplicacao()">*</button>
        <button id="divisao" onclick="divisao()">/</button>
        <button id="ce" onclick="c()">C</button>
    </div>

    <div id="resultado">=</div>

    <div id="resultadoTeste">
        <button onclick="testeSoma()">Testar Adição</button>
        <p id="resultadoBtnTesteSoma">Aguardando teste...</p>
    </div>
    
    <script>
        function soma() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            const soma = num1 + num2;

            document.getElementById("resultado").innerHTML = soma;
        }

            // TESTE DE SOMA
            function testeSoma() {
                const a = 3;
                const b = 4;
                const valorEsperado = 7;
                const testeSoma = a + b;

                document.getElementById("resultadoBtnTesteSoma").innerHTML = "O resultado está correto: " + testeSoma;

                if (testeSoma !== valorEsperado) {
                    return(document.getElementById("resultadoBtnTesteSoma").innerHTML = "O resultado esperado era: " + valorEsperado);
                }
            }

        function subtracao() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            const subtracao = num1 - num2;

            document.getElementById("resultado").innerHTML = subtracao;
        }
        
        function multiplicacao() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            const multiplicacao = num1 * num2;

            document.getElementById("resultado").innerHTML = multiplicacao;
        }     
        
        function divisao() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            const divisao = num1 / num2;

            document.getElementById("resultado").innerHTML = divisao;
        }
        
        function c() {
            document.getElementById("num1").value = "";
            document.getElementById("num2").value = "";
            document.getElementById("resultado").innerText = "=";
        }
    </script>
</body>
</html>
